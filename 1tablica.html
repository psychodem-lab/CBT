<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarysowane - Sesja z Tablicą</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        therapy: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Style specyficzne dla Tablicy */
        #canvasWrapper {
            position: relative;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        .dynamic-textarea {
            position: absolute;
            background: #ffffff;
            border: 1px solid #0ea5e9;
            border-radius: 4px;
            outline: none;
            padding: 6px;
            box-sizing: border-box;
            resize: none; 
            overflow: hidden;
            z-index: 100;
            font-family: Arial, sans-serif;
            line-height: 1.3;
            white-space: pre-wrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KROK 1: TWORZENIE POKOJU ---
        function CreateRoom({ setStep, setRoomInfo }) {
            const [name, setName] = useState('Sesja - (ID, numer)');
            const [members, setMembers] = useState(2);
            const [duration, setDuration] = useState(60);
            const [password, setPassword] = useState('');
            const [generatedLink, setGeneratedLink] = useState('');
            const [copied, setCopied] = useState(false);

            const handleCreate = (e) => {
                e.preventDefault();
                const roomId = Math.random().toString(36).substring(2, 9);
                const link = `https://therapyspace.app/room/${roomId}`;
                
                setRoomInfo({ name, members, duration, password, link, roomId });
                setGeneratedLink(link);
            };

            const handleCopyMessage = () => {
                const message = `Oto link do wspólnej pracy psychoterapeutycznej:\n${generatedLink}\n\nWejdź w link, podaj swoje imię oraz wpisz hasło: ${password}`;
                navigator.clipboard.writeText(message).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2500);
                }).catch((err) => {
                    console.error('Błąd podczas kopiowania: ', err);
                });
            };

            return (
                <div className="flex items-center justify-center min-h-screen p-4">
                    <div className="bg-white rounded-2xl shadow-xl border border-slate-100 p-8 w-full max-w-md">
                        <h1 className="text-2xl font-semibold text-slate-800 mb-6 text-center">Stwórz przestrzeń</h1>
                        
                        {!generatedLink ? (
                            <form onSubmit={handleCreate} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-medium text-slate-500 mb-1">Nazwa pokoju</label>
                                    <input type="text" value={name} onChange={e => setName(e.target.value)} required
                                        className="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-therapy-100 focus:border-therapy-500 outline-none transition-all" />
                                </div>
                                <div className="flex gap-4">
                                    <div className="w-1/2">
                                        <label className="block text-sm font-medium text-slate-500 mb-1">Maks. osób</label>
                                        <input type="number" value={members} onChange={e => setMembers(e.target.value)} min="2" max="10" required
                                            className="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-therapy-100 focus:border-therapy-500 outline-none transition-all" />
                                    </div>
                                    <div className="w-1/2">
                                        <label className="block text-sm font-medium text-slate-500 mb-1">Czas (min)</label>
                                        <input type="number" value={duration} onChange={e => setDuration(e.target.value)} min="15" step="15" required
                                            className="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-therapy-100 focus:border-therapy-500 outline-none transition-all" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-500 mb-1">Hasło dostępu</label>
                                    <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Np. 1234" required
                                        className="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-therapy-100 focus:border-therapy-500 outline-none transition-all" />
                                </div>
                                <button type="submit" 
                                    className="w-full bg-slate-800 hover:bg-slate-700 text-white font-medium py-3 rounded-lg transition-colors mt-4">
                                    Generuj pokój
                                </button>
                            </form>
                        ) : (
                             <div className="text-center space-y-6">
                                <div className="bg-therapy-50 text-therapy-900 p-4 rounded-lg border border-therapy-100 text-left">
                                    <p className="text-sm mb-2 text-therapy-600 font-medium">Link do pokoju:</p>
                                    <button 
                                        type="button"
                                        onClick={handleCopyMessage}
                                        className="w-full block bg-white hover:bg-slate-100 p-2 rounded border border-therapy-100 text-sm break-all font-mono mb-3 text-left transition-colors relative group focus:outline-none"
                                        title="Kliknij, aby skopiować pełną wiadomość"
                                    >
                                        <code className="text-slate-700 pointer-events-none">{generatedLink}</code>
                                        <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity">
                                            Kopiuj
                                        </span>
                                    </button>
                                    <div className="flex justify-between items-center min-h-[20px]">
                                        <p className="text-xs text-slate-500">Hasło do pokoju: <span className="font-bold text-slate-700">{password}</span></p>
                                        {copied && (
                                            <span className="text-xs text-emerald-600 font-semibold animate-pulse">
                                                Skopiowano zaproszenie!
                                            </span>
                                        )}
                                    </div>
                                </div>
                                <button onClick={() => setStep(2)} 
                                    className="w-full bg-therapy-500 hover:bg-therapy-600 text-white font-medium py-3 rounded-lg transition-colors shadow-sm">
                                    Przejdź do logowania →
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- KROK 2: LOGOWANIE Z LINKU ---
        function JoinRoom({ roomInfo, setStep, setUserInfo }) {
            const [nickname, setNickname] = useState('');
            const [inputPassword, setInputPassword] = useState('');
            const [error, setError] = useState('');

            const handleJoin = (e) => {
                e.preventDefault();
                if (inputPassword !== roomInfo.password) {
                    setError('Nieprawidłowe hasło. Wpisz hasło ustawione w Kroku 1.');
                    return;
                }
                setUserInfo({ nickname });
                setStep(3);
            };

            return (
                <div className="flex items-center justify-center min-h-screen p-4">
                    <div className="bg-white rounded-2xl shadow-xl border border-slate-100 p-8 w-full max-w-md">
                        <div className="text-center mb-6">
                            <h1 className="text-2xl font-semibold text-slate-800">Dołącz do sesji</h1>
                            <p className="text-slate-500 text-sm mt-2">Pokój: <span className="font-medium text-slate-700">{roomInfo?.name}</span></p>
                        </div>
                        
                        <form onSubmit={handleJoin} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-500 mb-1">Twój Nick / Imię</label>
                                <input type="text" value={nickname} onChange={e => setNickname(e.target.value)} required placeholder="Np. Pacjent Tomek"
                                    className="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-therapy-100 focus:border-therapy-500 outline-none transition-all" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-500 mb-1">Hasło</label>
                                <input type="password" value={inputPassword} onChange={e => {setInputPassword(e.target.value); setError('');}} required placeholder="Wpisz hasło z Kroku 1"
                                    className="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-therapy-100 focus:border-therapy-500 outline-none transition-all" />
                                {error && <p className="text-red-500 text-xs mt-2 font-medium">{error}</p>}
                            </div>
                            <button type="submit" 
                                className="w-full bg-slate-800 hover:bg-slate-700 text-white font-medium py-3 rounded-lg transition-colors mt-4">
                                Wejdź do pokoju
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // --- KOMPONENT TABLICY (ZINTEGROWANY Z tablica.txt) ---
        function Whiteboard({ userInfo }) {
            const canvasRef = useRef(null);
            const wrapperRef = useRef(null);
            const isInitialized = useRef(false);

            useEffect(() => {
                if (isInitialized.current) return;
                isInitialized.current = true;

                const canvas = canvasRef.current;
                const canvasWrapper = wrapperRef.current;
                const ctx = canvas.getContext('2d');
                
                const toolSelect = document.getElementById('toolSelect');
                const colorPicker = document.getElementById('colorPicker');
                const brushSize = document.getElementById('brushSize');
                const clearBtn = document.getElementById('clearBtn');
                const downloadJpg = document.getElementById('downloadJpg');
                const undoBtn = document.getElementById('undoBtn');
                
                const offscreenCanvas = document.createElement('canvas');
                const oCtx = offscreenCanvas.getContext('2d');

                let undoStack = [];
                let internalClipboard = null;
                let clipboardW = 0, clipboardH = 0;

                let isTransforming = false;
                let activeTransformMode = null;
                let selX = 0, selY = 0, selW = 0, selH = 0, selAngle = 0;
                let dragOffsetX = 0, dragOffsetY = 0;

                let isDrawing = false;
                let startX, startY;
                let snapshot; 
                
                let currentTextarea = null;

                let isEditingArrow = false;
                let isDraggingArrowControl = false;
                let arrowStart = {x: 0, y: 0};
                let arrowEnd = {x: 0, y: 0};
                let arrowControl = {x: 0, y: 0};

                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                saveState();

                function saveState() {
                    if (undoStack.length > 20) undoStack.shift();
                    undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
                }

                function undo() {
                    if (isTransforming) commitTransform();
                    if (currentTextarea) commitText(); 
                    if (isEditingArrow) isEditingArrow = false;
                    if (undoStack.length > 1) {
                        undoStack.pop();
                        ctx.putImageData(undoStack[undoStack.length - 1], 0, 0); 
                        isTransforming = false;
                    }
                }

                undoBtn.addEventListener('click', undo);

                toolSelect.addEventListener('change', () => {
                    if (isTransforming) commitTransform();
                    if (currentTextarea) commitText();
                    if (isEditingArrow) commitArrow();
                });

                function commitTransform() {
                    if (!isTransforming) return;
                    ctx.putImageData(snapshot, 0, 0);
                    ctx.save();
                    ctx.translate(selX + selW / 2, selY + selH / 2);
                    ctx.rotate(selAngle);
                    ctx.drawImage(offscreenCanvas, -selW / 2, -selH / 2, selW, selH);
                    ctx.restore();
                    saveState();
                    isTransforming = false;
                    activeTransformMode = null;
                }

                function drawTransforming() {
                    ctx.putImageData(snapshot, 0, 0);
                    ctx.save();
                    ctx.translate(selX + selW / 2, selY + selH / 2);
                    ctx.rotate(selAngle);
                    ctx.drawImage(offscreenCanvas, -selW / 2, -selH / 2, selW, selH);
                    ctx.setLineDash([5, 5]);
                    ctx.strokeStyle = "#007bff";
                    ctx.lineWidth = 1;
                    ctx.strokeRect(-selW / 2, -selH / 2, selW, selH);
                    ctx.setLineDash([]);
                    ctx.fillStyle = "#007bff";
                    ctx.fillRect(selW / 2 - 5, selH / 2 - 5, 10, 10);
                    ctx.beginPath();
                    ctx.arc(0, -selH / 2 - 20, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(0, -selH / 2);
                    ctx.lineTo(0, -selH / 2 - 20);
                    ctx.stroke();
                    ctx.restore();
                }

                function commitArrow() {
                    if (!isEditingArrow) return;
                    ctx.putImageData(snapshot, 0, 0);
                    drawCurvedArrow(ctx, arrowStart, arrowControl, arrowEnd, colorPicker.value, brushSize.value, false);
                    saveState();
                    isEditingArrow = false;
                }

                function drawCurvedArrow(context, start, control, end, color, width, drawControlDot) {
                    context.save();
                    context.strokeStyle = color;
                    context.fillStyle = color;
                    context.lineWidth = width;
                    context.lineCap = 'round';
                    context.lineJoin = 'round';
                    context.setLineDash([]);
                    
                    context.beginPath();
                    context.moveTo(start.x, start.y);
                    context.quadraticCurveTo(control.x, control.y, end.x, end.y);
                    context.stroke();

                    const angle = Math.atan2(end.y - control.y, end.x - control.x);
                    const arrowLength = Math.max(15, width * 3); 

                    context.beginPath();
                    context.moveTo(end.x, end.y);
                    context.lineTo(end.x - arrowLength * Math.cos(angle - Math.PI / 6), end.y - arrowLength * Math.sin(angle - Math.PI / 6));
                    context.lineTo(end.x - arrowLength * Math.cos(angle + Math.PI / 6), end.y - arrowLength * Math.sin(angle + Math.PI / 6));
                    context.closePath();
                    context.fill();

                    if (drawControlDot) {
                        context.beginPath();
                        context.arc(control.x, control.y, 8, 0, Math.PI * 2);
                        context.fillStyle = "#007bff";
                        context.fill();
                        context.strokeStyle = "#ffffff";
                        context.lineWidth = 2;
                        context.stroke();
                    }
                    context.restore();
                }

                function commitText() {
                    if (!currentTextarea) return;
                    const text = currentTextarea.value;
                    if (text.trim() !== '') {
                        const fontSize = parseInt(currentTextarea.style.fontSize);
                        ctx.font = `${fontSize}px Arial`;
                        ctx.fillStyle = currentTextarea.style.color;
                        ctx.textBaseline = 'top';
                        
                        const padding = 6; 
                        const x = parseInt(currentTextarea.style.left) + padding;
                        const y = parseInt(currentTextarea.style.top) + padding;
                        const maxWidth = currentTextarea.clientWidth - (padding * 2);
                        const lineHeight = fontSize * 1.3;
                        drawWrappedText(ctx, text, x, y, maxWidth, lineHeight);
                        saveState();
                    }
                    
                    if (currentTextarea.parentNode === canvasWrapper) {
                        canvasWrapper.removeChild(currentTextarea);
                    }
                    currentTextarea = null;
                }

                function drawWrappedText(context, text, x, y, maxWidth, lineHeight) {
                    const paragraphs = text.split('\n');
                    let currentY = y;
                    
                    for (let p = 0; p < paragraphs.length; p++) {
                        const words = paragraphs[p].split(' ');
                        let line = '';

                        for (let n = 0; n < words.length; n++) {
                            const testLine = line + words[n] + ' ';
                            const metrics = context.measureText(testLine);
                            const testWidth = metrics.width;
                            
                            if (testWidth > maxWidth && n > 0) {
                                context.fillText(line, x, currentY);
                                line = words[n] + ' ';
                                currentY += lineHeight;
                            } else {
                                line = testLine;
                            }
                        }
                        context.fillText(line, x, currentY);
                        currentY += lineHeight;
                    }
                }

                canvas.addEventListener('mousedown', (e) => {
                    if (currentTextarea) commitText();

                    if (isEditingArrow) {
                        const dist = Math.sqrt(Math.pow(e.offsetX - arrowControl.x, 2) + Math.pow(e.offsetY - arrowControl.y, 2));
                        if (dist < 12) {
                            isDraggingArrowControl = true;
                            return;
                        } else {
                            commitArrow(); 
                        }
                    }

                    if (isTransforming) {
                        let cx = selX + selW / 2;
                        let cy = selY + selH / 2;
                        let dx = e.offsetX - cx;
                        let dy = e.offsetY - cy;
                        
                        let rx = dx * Math.cos(-selAngle) - dy * Math.sin(-selAngle);
                        let ry = dx * Math.sin(-selAngle) + dy * Math.cos(-selAngle);
                        
                        let distRotate = Math.sqrt(rx * rx + (ry + selH / 2 + 20) * (ry + selH / 2 + 20));
                        let distResize = Math.sqrt((rx - selW / 2) * (rx - selW / 2) + (ry - selH / 2) * (ry - selH / 2));
                        
                        if (distRotate < 15) {
                            activeTransformMode = 'rotate';
                            return;
                        } else if (distResize < 15) {
                            activeTransformMode = 'resize';
                            return;
                        } else if (rx >= -selW / 2 && rx <= selW / 2 && ry >= -selH / 2 && ry <= selH / 2) {
                            activeTransformMode = 'move';
                            dragOffsetX = e.offsetX - selX;
                            dragOffsetY = e.offsetY - selY;
                            return;
                        } else {
                            commitTransform();
                        }
                    }

                    isDrawing = true;
                    startX = e.offsetX;
                    startY = e.offsetY;
                    snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

                    ctx.strokeStyle = colorPicker.value;
                    ctx.fillStyle = colorPicker.value;
                    ctx.lineWidth = brushSize.value;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.setLineDash([]);
                    
                    if (toolSelect.value !== 'select' && toolSelect.value !== 'text' && toolSelect.value !== 'arrow') {
                        ctx.beginPath();
                    }
                });

                canvas.addEventListener('mousemove', (e) => {
                    if (isEditingArrow && isDraggingArrowControl) {
                        arrowControl.x = e.offsetX;
                        arrowControl.y = e.offsetY;
                        ctx.putImageData(snapshot, 0, 0);
                        drawCurvedArrow(ctx, arrowStart, arrowControl, arrowEnd, colorPicker.value, brushSize.value, true);
                        return;
                    }

                    if (isTransforming && activeTransformMode) {
                        if (activeTransformMode === 'move') {
                            selX = e.offsetX - dragOffsetX;
                            selY = e.offsetY - dragOffsetY;
                        } else if (activeTransformMode === 'rotate') {
                            let cx = selX + selW / 2;
                            let cy = selY + selH / 2;
                            selAngle = Math.atan2(e.offsetY - cy, e.offsetX - cx) + Math.PI / 2;
                        } else if (activeTransformMode === 'resize') {
                            let cx = selX + selW / 2;
                            let cy = selY + selH / 2;
                            let dx = e.offsetX - cx;
                            let dy = e.offsetY - cy;
                            let rx = dx * Math.cos(-selAngle) - dy * Math.sin(-selAngle);
                            let ry = dx * Math.sin(-selAngle) + dy * Math.cos(-selAngle);
                            selW = Math.max(20, Math.abs(rx) * 2);
                            selH = Math.max(20, Math.abs(ry) * 2);
                        }
                        drawTransforming();
                        return;
                    }

                    if (!isDrawing) return;
                    const currentTool = toolSelect.value;
                    if (currentTool !== 'pen') {
                        ctx.putImageData(snapshot, 0, 0);
                    }

                    if (currentTool === 'pen') {
                        ctx.lineTo(e.offsetX, e.offsetY);
                        ctx.stroke();
                    } else if (currentTool === 'rect') {
                        ctx.strokeRect(startX, startY, e.offsetX - startX, e.offsetY - startY);
                    } else if (currentTool === 'circle') {
                        const radius = Math.sqrt(Math.pow(e.offsetX - startX, 2) + Math.pow(e.offsetY - startY, 2));
                        ctx.beginPath();
                        ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
                        ctx.stroke();
                    } else if (currentTool === 'arrow') {
                        let tempControl = { x: (startX + e.offsetX) / 2, y: (startY + e.offsetY) / 2 };
                        drawCurvedArrow(ctx, {x: startX, y: startY}, tempControl, {x: e.offsetX, y: e.offsetY}, colorPicker.value, brushSize.value, false);
                    } else if (currentTool === 'select' || currentTool === 'text') {
                        ctx.setLineDash([4, 4]);
                        ctx.strokeStyle = currentTool === 'select' ? "#007bff" : colorPicker.value;
                        ctx.lineWidth = 1;
                        ctx.strokeRect(startX, startY, e.offsetX - startX, e.offsetY - startY);
                    }
                });

                canvas.addEventListener('mouseup', (e) => {
                    if (isEditingArrow && isDraggingArrowControl) {
                        isDraggingArrowControl = false;
                        return;
                    }

                    if (isTransforming) {
                        activeTransformMode = null;
                        return;
                    }

                    if (!isDrawing) return;
                    isDrawing = false;

                    const currentTool = toolSelect.value;

                    if (currentTool === 'arrow') {
                        ctx.putImageData(snapshot, 0, 0);
                        arrowStart = { x: startX, y: startY };
                        arrowEnd = { x: e.offsetX, y: e.offsetY };
                        arrowControl = { x: (startX + e.offsetX) / 2, y: (startY + e.offsetY) / 2 };
                        isEditingArrow = true;
                        drawCurvedArrow(ctx, arrowStart, arrowControl, arrowEnd, colorPicker.value, brushSize.value, true);
                    } else if (currentTool === 'text') {
                        ctx.putImageData(snapshot, 0, 0);
                        let x = Math.min(startX, e.offsetX);
                        let y = Math.min(startY, e.offsetY);
                        let w = Math.abs(e.offsetX - startX);
                        let h = Math.abs(e.offsetY - startY);
                        
                        if (w < 15 || h < 15) { w = 200; h = 80; }

                        const fontSize = Math.max(12, brushSize.value * 3);
                        const textarea = document.createElement('textarea');
                        textarea.className = 'dynamic-textarea';
                        textarea.style.left = `${x}px`;
                        textarea.style.top = `${y}px`;
                        textarea.style.width = `${w}px`;
                        textarea.style.height = `${h}px`;
                        textarea.style.color = colorPicker.value;
                        textarea.style.fontSize = `${fontSize}px`;
                        textarea.placeholder = "Zacznij pisać tutaj...";

                        canvasWrapper.appendChild(textarea);
                        textarea.focus();
                        currentTextarea = textarea;
                    } else if (currentTool === 'select') {
                        let w = Math.abs(e.offsetX - startX);
                        let h = Math.abs(e.offsetY - startY);
                        
                        if (w > 5 && h > 5) {
                            selX = Math.min(startX, e.offsetX);
                            selY = Math.min(startY, e.offsetY);
                            selW = w;
                            selH = h;
                            selAngle = 0;

                            ctx.putImageData(snapshot, 0, 0);

                            offscreenCanvas.width = selW;
                            offscreenCanvas.height = selH;
                            oCtx.drawImage(canvas, selX, selY, selW, selH, 0, 0, selW, selH);

                            ctx.fillStyle = "white";
                            ctx.fillRect(selX, selY, selW, selH);
                            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
                            
                            isTransforming = true;
                            drawTransforming();
                        }
                    } else {
                        saveState();
                    }
                });

                const handleKeyDown = (e) => {
                    if (document.activeElement.tagName === 'TEXTAREA') return;

                    if (e.ctrlKey && e.key.toLowerCase() === 'z') {
                        undo();
                    }
                    else if (e.ctrlKey && e.key.toLowerCase() === 'c') {
                        if (isTransforming) {
                            internalClipboard = oCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height);
                            clipboardW = offscreenCanvas.width;
                            clipboardH = offscreenCanvas.height;
                        }
                    }
                    else if (e.ctrlKey && e.key.toLowerCase() === 'x') {
                        if (isTransforming) {
                            internalClipboard = oCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height);
                            clipboardW = offscreenCanvas.width;
                            clipboardH = offscreenCanvas.height;
                            isTransforming = false;
                            ctx.putImageData(snapshot, 0, 0);
                            saveState();
                        }
                    }
                    else if (e.ctrlKey && e.key.toLowerCase() === 'v') {
                        if (internalClipboard) {
                            if (isTransforming) commitTransform();
                            if (isEditingArrow) commitArrow();
                            
                            selX = 50;
                            selY = 50;
                            selW = clipboardW;
                            selH = clipboardH;
                            selAngle = 0;
                            offscreenCanvas.width = selW;
                            offscreenCanvas.height = selH;
                            oCtx.putImageData(internalClipboard, 0, 0);

                            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
                            isTransforming = true;
                            drawTransforming();
                        }
                    }
                    else if (e.key === 'Delete' || e.key === 'Del') {
                        if (isTransforming) {
                            isTransforming = false;
                            activeTransformMode = null;
                            ctx.putImageData(snapshot, 0, 0); 
                            saveState();
                        }
                    }
                };
                
                document.addEventListener('keydown', handleKeyDown);

                clearBtn.addEventListener('click', () => {
                    if (isTransforming) isTransforming = false;
                    if (isEditingArrow) isEditingArrow = false;
                    if (currentTextarea) {
                        if (currentTextarea.parentNode === canvasWrapper) canvasWrapper.removeChild(currentTextarea);
                        currentTextarea = null;
                    }
                    ctx.fillStyle = "white";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    saveState();
                });

                downloadJpg.addEventListener('click', () => {
                    if (isTransforming) commitTransform();
                    if (currentTextarea) commitText();
                    if (isEditingArrow) commitArrow();
                    const link = document.createElement('a');
                    link.download = `Tablica_Sesja_${userInfo?.nickname || 'Pacjent'}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 1.0);
                    link.click();
                });

                return () => {
                    document.removeEventListener('keydown', handleKeyDown);
                };
            }, [userInfo]);

            return (
                <div className="flex gap-4 h-full w-full justify-center">
                    <div className="w-64 bg-slate-50 border border-slate-200 p-4 rounded-lg flex flex-col gap-4 shadow-sm shrink-0 overflow-y-auto">
                        <div className="text-sm font-medium text-slate-700 border-b border-slate-200 pb-2">Opcje rysowania</div>
                        
                        <div className="space-y-1">
                            <label className="text-xs text-slate-500 font-semibold">Narzędzie:</label>
                            <select id="toolSelect" className="w-full p-2 border border-slate-200 rounded text-sm bg-white outline-none">
                                <option value="pen">Pędzel</option>
                                <option value="rect">Prostokąt</option>
                                <option value="circle">Koło</option>
                                <option value="arrow">Strzałka (Łuk) ↗</option>
                                <option value="text">Pole tekstowe</option>
                                <option value="select">Zaznacz obszar</option>
                            </select>
                        </div>
                        
                        <div className="space-y-1">
                            <label className="text-xs text-slate-500 font-semibold">Kolor:</label>
                            <input type="color" id="colorPicker" defaultValue="#000000" className="w-full h-8 p-0 border border-slate-200 rounded cursor-pointer" />
                        </div>

                        <div className="space-y-1">
                            <label className="text-xs text-slate-500 font-semibold">Grubość / Rozmiar:</label>
                            <input type="range" id="brushSize" min="1" max="50" defaultValue="5" className="w-full accent-therapy-500 cursor-pointer" />
                        </div>

                        <button id="undoBtn" className="mt-2 w-full bg-white border border-slate-300 text-slate-700 text-sm font-medium py-2 rounded hover:bg-slate-50 transition">
                            Cofnij (Ctrl+Z)
                        </button>

                        <div className="mt-auto pt-4 space-y-2 border-t border-slate-200">
                            <button id="clearBtn" className="w-full bg-red-50 text-red-600 border border-red-200 text-sm font-medium py-2 rounded hover:bg-red-100 transition">
                                Wyczyść tablicę
                            </button>
                            <button id="downloadJpg" className="w-full bg-emerald-500 text-white text-sm font-medium py-2 rounded hover:bg-emerald-600 transition">
                                Pobierz Tablicę JPG
                            </button>
                        </div>
                    </div>

                    <div id="canvasWrapper" ref={wrapperRef} className="shadow-sm shrink-0">
                        <canvas ref={canvasRef} id="board" width="800" height="600"></canvas>
                    </div>
                </div>
            );
        }

        // --- KROK 3: PANEL WSPÓŁPRACY ---
        function Workspace({ roomInfo, userInfo, setStep }) {
            const [content, setContent] = useState('');
            const [timeLeft, setTimeLeft] = useState((roomInfo?.duration || 60) * 60);
            const [isExporting, setIsExporting] = useState(false);
            const [activeTab, setActiveTab] = useState('text'); // 'text' lub 'board'

            useEffect(() => {
                const timer = setInterval(() => {
                    setTimeLeft((prev) => (prev > 0 ? prev - 1 : 0));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const handleExportPDF = () => {
                setIsExporting(true);
                const element = document.createElement('div');
                const formattedContent = content.replace(/\n/g, '<br>');
                element.innerHTML = `
                    <div style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 50px; color: #1e293b; background: #ffffff;">
                        <div style="border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 30px;">
                            <h1 style="font-size: 26px; font-weight: 700; color: #0c4a6e; margin: 0 0 8px 0;">${roomInfo?.name || 'Sesja Terapeutyczna'}</h1>
                            <p style="font-size: 14px; color: #64748b; margin: 0;">Podsumowanie sesji psychoterapii </p>
                        </div>
                        
                        <div style="margin-bottom: 30px; background: #f8fafc; padding: 15px; border-radius: 8px; font-size: 13px; color: #475569;">
                            <table style="width: 100%; border-collapse: collapse;">
                                <tr>
                                    <td style="padding: 4px 0;"><strong>Uczestnik sesji:</strong> ${userInfo?.nickname}</td>
                                    <td style="padding: 4px 0; text-align: right;"><strong>Data wygenerowania:</strong> ${new Date().toLocaleDateString('pl-PL')}</td>
                                </tr>
                                <tr>
                                    <td style="padding: 4px 0;"><strong>Status dokumentu:</strong> Zapisany pomyślnie</td>
                                    <td style="padding: 4px 0; text-align: right;"><strong>Platforma:</strong> Zarysowane</td>
                                </tr>
                            </table>
                        </div>

                        <div style="font-size: 15px; line-height: 1.8; color: #334155; min-height: 400px;">
                            ${formattedContent || '<em>Brak notatek tekstowych z sesji.</em>'}
                        </div>

                        <div style="margin-top: 50px; border-top: 1px solid #e2e8f0; padding-top: 15px; text-align: center; font-size: 11px; color: #94a3b8;">
                            Dokument wygenerowany automatycznie przez aplikację Zarysowane. Treści zawarte w dokumencie są objęte tajemnicą zawodową.
                        </div>
                    </div>
                `;

                const opt = {
                    margin:       10,
                    filename:     `Notatki_${userInfo?.nickname || 'Pacjent'}_${new Date().toISOString().slice(0,10)}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                html2pdf().from(element).set(opt).save().then(() => {
                    setIsExporting(false);
                }).catch(() => {
                    setIsExporting(false);
                });
            };

            return (
                <div className="h-screen flex flex-col bg-slate-50">
                    <header className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 shadow-sm z-10 relative">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 rounded-full bg-therapy-100 flex items-center justify-center text-therapy-600 font-bold">
                                {userInfo?.nickname?.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h2 className="font-semibold text-slate-800">{roomInfo?.name}</h2>
                                <p className="text-xs text-slate-500">Uczestnik: {userInfo?.nickname}</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <div className="text-right mr-2">
                                <span className="text-[10px] text-slate-500 uppercase tracking-wider font-bold block">Czas sesji</span>
                                <div className={`text-xl font-mono font-medium ${timeLeft < 300 ? 'text-amber-400 font-bold animate-pulse' : 'text-slate-400'}`}>
                                    {formatTime(timeLeft)}
                                </div>
                            </div>

                            <button 
                                onClick={handleExportPDF} 
                                disabled={isExporting}
                                className="text-sm px-4 py-2 bg-therapy-500 hover:bg-therapy-600 text-white font-medium rounded-lg transition-colors flex items-center gap-2 shadow-sm disabled:opacity-50"
                                title="Pobierz zawartość pola tekstowego jako PDF"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                                {isExporting ? 'Generowanie...' : 'PDF (Notatki)'}
                            </button>

                            <button onClick={() => setStep(1)} className="text-sm px-4 py-2 border border-slate-200 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-colors">
                                Wyjdź
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden p-4 md:p-6 flex flex-col items-center">
                        <div className="w-full max-w-5xl flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                            
                            {/* Zakładki */}
                            <div className="flex bg-slate-50 border-b border-slate-200 px-4 pt-2 gap-1 shrink-0">
                                <button 
                                    onClick={() => setActiveTab('text')} 
                                    className={`px-5 py-2.5 rounded-t-lg text-sm font-medium transition-colors ${activeTab === 'text' ? 'bg-white text-therapy-600 border-t border-l border-r border-slate-200' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-700'}`}
                                >
                                    Notatki Tekstowe
                                </button>
                                <button 
                                    onClick={() => setActiveTab('board')} 
                                    className={`px-5 py-2.5 rounded-t-lg text-sm font-medium transition-colors ${activeTab === 'board' ? 'bg-white text-therapy-600 border-t border-l border-r border-slate-200' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-700'}`}
                                >
                                    Wirtualna Tablica
                                </button>
                            </div>

                            <div className="h-8 bg-slate-50/50 border-b border-slate-100 flex items-center px-4 justify-between shrink-0">
                                <div className="flex items-center gap-2">
                                    <span className="relative flex h-2 w-2">
                                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                      <span className="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                                    </span>
                                    <span className="text-[11px] text-slate-400 font-medium">
                                        Połączenie aktywne • Obie osoby w pokoju
                                    </span>
                                </div>
                                <span className="text-[10px] text-slate-400 italic">
                                    Zmiany zapisują się automatycznie (tylko w Twojej przeglądarce)
                                </span>
                            </div>

                            {/* Obszar roboczy */}
                            <div className="flex-1 overflow-auto relative">
                                {activeTab === 'text' ? (
                                    <textarea 
                                        value={content}
                                        onChange={(e) => setContent(e.target.value)}
                                        className="w-full h-full p-8 resize-none outline-none text-slate-700 text-lg leading-relaxed bg-transparent font-light"
                                        placeholder="Zacznij pisać tutaj..."
                                    ></textarea>
                                ) : (
                                    <div className="p-6 h-full flex justify-center items-center bg-slate-100/50">
                                        <Whiteboard userInfo={userInfo} />
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // --- GŁÓWNY ZARZĄDCA STANU APLIKACJI ---
        function App() {
            const [step, setStep] = useState(1);
            const [roomInfo, setRoomInfo] = useState(null);
            const [userInfo, setUserInfo] = useState(null);

            return (
                <div className="font-sans antialiased bg-slate-50 text-slate-800">
                    {step === 1 && <CreateRoom setStep={setStep} setRoomInfo={setRoomInfo} />}
                    {step === 2 && <JoinRoom roomInfo={roomInfo} setStep={setStep} setUserInfo={setUserInfo} />}
                    {step === 3 && <Workspace roomInfo={roomInfo} userInfo={userInfo} setStep={setStep} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
