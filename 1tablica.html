<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zarysowane - Sesja z Tablicą</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        therapy: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            overscroll-behavior-y: none; /* Zapobiega "pull-to-refresh" na urządzeniach mobilnych */
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Style specyficzne dla Tablicy */
        #canvasWrapper {
            position: relative;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            /* Zapewnia skalowanie na małych urządzeniach */
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
            touch-action: none; /* KLUCZOWE NA MOBILE: blokuje scrollowanie palcem przy rysowaniu */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .dynamic-textarea {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border: 2px dashed #0ea5e9;
            border-radius: 6px;
            outline: none;
            padding: 8px;
            box-sizing: border-box;
            resize: none; 
            overflow: hidden;
            z-index: 100;
            font-family: 'Inter', sans-serif;
            line-height: 1.4;
            white-space: pre-wrap;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        /* Usprawnienie mobilnego paska narzędzi */
        .mobile-tool-scroll {
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox */
        }
        .mobile-tool-scroll::-webkit-scrollbar {
            display: none; /* Chrome, Safari */
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KROK 1: TWORZENIE POKOJU ---
        function CreateRoom({ setStep, setRoomInfo }) {
            const [name, setName] = useState('Sesja - (ID, numer)');
            const [members, setMembers] = useState(2);
            const [duration, setDuration] = useState(60);
            const [password, setPassword] = useState('');
            const [generatedLink, setGeneratedLink] = useState('');
            const [copied, setCopied] = useState(false);

            const handleCreate = (e) => {
                e.preventDefault();
                const roomId = Math.random().toString(36).substring(2, 9);
                const link = `https://therapyspace.app/room/${roomId}`;
                
                setRoomInfo({ name, members, duration, password, link, roomId });
                setGeneratedLink(link);
            };

            const handleCopyMessage = () => {
                const message = `Oto link do wspólnej pracy psychoterapeutycznej:\n${generatedLink}\n\nWejdź w link, podaj swoje imię oraz wpisz hasło: ${password}`;
                navigator.clipboard.writeText(message).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2500);
                }).catch((err) => {
                    console.error('Błąd podczas kopiowania: ', err);
                });
            };

            return (
                <div className="flex items-center justify-center min-h-screen p-4 sm:p-6">
                    <div className="bg-white rounded-2xl shadow-xl border border-slate-100 p-6 sm:p-8 w-full max-w-md">
                        <h1 className="text-2xl font-semibold text-slate-800 mb-6 text-center">Stwórz przestrzeń</h1>
                        
                        {!generatedLink ? (
                            <form onSubmit={handleCreate} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-medium text-slate-500 mb-1">Nazwa pokoju</label>
                                    <input type="text" value={name} onChange={e => setName(e.target.value)} required
                                        className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-therapy-100 focus:border-therapy-500 outline-none transition-all" />
                                </div>
                                <div className="flex flex-col sm:flex-row gap-4">
                                    <div className="w-full sm:w-1/2">
                                        <label className="block text-sm font-medium text-slate-500 mb-1">Maks. osób</label>
                                        <input type="number" value={members} onChange={e => setMembers(e.target.value)} min="2" max="10" required
                                            className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-therapy-100 focus:border-therapy-500 outline-none transition-all" />
                                    </div>
                                    <div className="w-full sm:w-1/2">
                                        <label className="block text-sm font-medium text-slate-500 mb-1">Czas (min)</label>
                                        <input type="number" value={duration} onChange={e => setDuration(e.target.value)} min="15" step="15" required
                                            className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-therapy-100 focus:border-therapy-500 outline-none transition-all" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-500 mb-1">Hasło dostępu</label>
                                    <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Np. 1234" required
                                        className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-therapy-100 focus:border-therapy-500 outline-none transition-all" />
                                </div>
                                <button type="submit" 
                                    className="w-full bg-slate-800 hover:bg-slate-700 active:scale-[0.98] text-white font-medium py-3 sm:py-4 rounded-xl transition-all mt-4">
                                    Generuj pokój
                                </button>
                            </form>
                        ) : (
                            <div className="text-center space-y-6">
                                <div className="bg-therapy-50 text-therapy-900 p-5 rounded-xl border border-therapy-100 text-left">
                                    <p className="text-sm mb-2 text-therapy-600 font-medium">Link do pokoju:</p>
                                    <button 
                                        type="button"
                                        onClick={handleCopyMessage}
                                        className="w-full block bg-white hover:bg-slate-100 p-3 rounded-lg border border-therapy-100 text-sm break-all font-mono mb-3 text-left transition-colors relative group focus:outline-none"
                                        title="Kliknij, aby skopiować pełną wiadomość"
                                    >
                                        <code className="text-slate-700 pointer-events-none block overflow-hidden text-ellipsis whitespace-nowrap">{generatedLink}</code>
                                        <span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs bg-slate-800 text-white px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity">
                                            Kopiuj wszystko
                                        </span>
                                    </button>
                                    <div className="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center min-h-[20px] gap-2">
                                        <p className="text-sm text-slate-600">Hasło: <span className="font-bold text-slate-800">{password}</span></p>
                                        {copied && (
                                            <span className="text-xs text-emerald-600 font-semibold animate-pulse bg-emerald-50 px-2 py-1 rounded">
                                                Skopiowano pomyślnie!
                                            </span>
                                        )}
                                    </div>
                                </div>
                                <button onClick={() => setStep(2)} 
                                    className="w-full bg-therapy-500 hover:bg-therapy-600 active:scale-[0.98] text-white font-medium py-3 sm:py-4 rounded-xl transition-all shadow-sm">
                                    Przejdź do logowania →
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- KROK 2: LOGOWANIE Z LINKU ---
        function JoinRoom({ roomInfo, setStep, setUserInfo }) {
            const [nickname, setNickname] = useState('');
            const [inputPassword, setInputPassword] = useState('');
            const [error, setError] = useState('');

            const handleJoin = (e) => {
                e.preventDefault();
                if (inputPassword !== roomInfo.password) {
                    setError('Nieprawidłowe hasło. Wpisz hasło ustawione w Kroku 1.');
                    return;
                }
                setUserInfo({ nickname });
                setStep(3);
            };

            return (
                <div className="flex items-center justify-center min-h-screen p-4 sm:p-6">
                    <div className="bg-white rounded-2xl shadow-xl border border-slate-100 p-6 sm:p-8 w-full max-w-md">
                        <div className="text-center mb-6">
                            <h1 className="text-2xl font-semibold text-slate-800">Dołącz do sesji</h1>
                            <p className="text-slate-500 text-sm mt-2">Pokój: <span className="font-medium text-slate-700">{roomInfo?.name}</span></p>
                        </div>
                        
                        <form onSubmit={handleJoin} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-500 mb-1">Twój Nick / Imię</label>
                                <input type="text" value={nickname} onChange={e => setNickname(e.target.value)} required placeholder="Np. Pacjent Tomek"
                                    className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-therapy-100 focus:border-therapy-500 outline-none transition-all" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-500 mb-1">Hasło</label>
                                <input type="password" value={inputPassword} onChange={e => {setInputPassword(e.target.value); setError('');}} required placeholder="Wpisz hasło z Kroku 1"
                                    className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-therapy-100 focus:border-therapy-500 outline-none transition-all" />
                                {error && <p className="text-red-500 text-sm mt-2 font-medium bg-red-50 p-2 rounded-lg">{error}</p>}
                            </div>
                            <button type="submit" 
                                className="w-full bg-slate-800 hover:bg-slate-700 active:scale-[0.98] text-white font-medium py-3 sm:py-4 rounded-xl transition-all mt-4">
                                Wejdź do pokoju
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // --- KOMPONENT TABLICY (ZMINIEJSZONY PANEL + POINTER EVENTS) ---
        function Whiteboard({ userInfo }) {
            const canvasRef = useRef(null);
            const wrapperRef = useRef(null);
            const isInitialized = useRef(false);

            useEffect(() => {
                if (isInitialized.current) return;
                isInitialized.current = true;

                const canvas = canvasRef.current;
                const canvasWrapper = wrapperRef.current;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                
                const toolSelect = document.getElementById('toolSelect');
                const colorPicker = document.getElementById('colorPicker');
                const brushSize = document.getElementById('brushSize');
                const clearBtn = document.getElementById('clearBtn');
                const downloadJpg = document.getElementById('downloadJpg');
                const undoBtn = document.getElementById('undoBtn');
                
                const offscreenCanvas = document.createElement('canvas');
                const oCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

                let undoStack = [];
                let internalClipboard = null;
                let clipboardW = 0, clipboardH = 0;

                let isTransforming = false;
                let activeTransformMode = null;
                let selX = 0, selY = 0, selW = 0, selH = 0, selAngle = 0;
                let dragOffsetX = 0, dragOffsetY = 0;

                let isDrawing = false;
                let startX, startY;
                let snapshot; 
                
                let currentTextarea = null;
                let isEditingArrow = false;
                let isDraggingArrowControl = false;
                let arrowStart = {x: 0, y: 0};
                let arrowEnd = {x: 0, y: 0};
                let arrowControl = {x: 0, y: 0};

                // Ustaw początkowy kolor tła
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                saveState();

                // Funkcja pomocnicza do pobierania współrzędnych z obsługą skalowania CSS (szczególnie na urządzeniach mobilnych)
                function getCoords(e) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    return {
                        x: (e.clientX - rect.left) * scaleX,
                        y: (e.clientY - rect.top) * scaleY
                    };
                }

                function saveState() {
                    if (undoStack.length > 20) undoStack.shift();
                    undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
                }

                function undo() {
                    if (isTransforming) commitTransform();
                    if (currentTextarea) commitText(); 
                    if (isEditingArrow) isEditingArrow = false;
                    if (undoStack.length > 1) {
                        undoStack.pop();
                        ctx.putImageData(undoStack[undoStack.length - 1], 0, 0); 
                        isTransforming = false;
                    }
                }

                undoBtn.addEventListener('click', undo);
                
                toolSelect.addEventListener('change', () => {
                    if (isTransforming) commitTransform();
                    if (currentTextarea) commitText();
                    if (isEditingArrow) commitArrow();
                });

                function commitTransform() {
                    if (!isTransforming) return;
                    ctx.putImageData(snapshot, 0, 0);
                    ctx.save();
                    ctx.translate(selX + selW / 2, selY + selH / 2);
                    ctx.rotate(selAngle);
                    ctx.drawImage(offscreenCanvas, -selW / 2, -selH / 2, selW, selH);
                    ctx.restore();
                    saveState();
                    isTransforming = false;
                    activeTransformMode = null;
                }

                function drawTransforming() {
                    ctx.putImageData(snapshot, 0, 0);
                    ctx.save();
                    ctx.translate(selX + selW / 2, selY + selH / 2);
                    ctx.rotate(selAngle);
                    ctx.drawImage(offscreenCanvas, -selW / 2, -selH / 2, selW, selH);
                    
                    // Rysowanie ramki zaznaczenia
                    ctx.setLineDash([5, 5]);
                    ctx.strokeStyle = "#0ea5e9";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(-selW / 2, -selH / 2, selW, selH);
                    ctx.setLineDash([]);
                    
                    // Uchwyt zmiany rozmiaru
                    ctx.fillStyle = "#0ea5e9";
                    ctx.fillRect(selW / 2 - 6, selH / 2 - 6, 12, 12);
                    
                    // Uchwyt obrotu
                    ctx.beginPath();
                    ctx.arc(0, -selH / 2 - 25, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(0, -selH / 2);
                    ctx.lineTo(0, -selH / 2 - 25);
                    ctx.stroke();
                    ctx.restore();
                }

                function commitArrow() {
                    if (!isEditingArrow) return;
                    ctx.putImageData(snapshot, 0, 0);
                    drawCurvedArrow(ctx, arrowStart, arrowControl, arrowEnd, colorPicker.value, brushSize.value, false);
                    saveState();
                    isEditingArrow = false;
                }

                function drawCurvedArrow(context, start, control, end, color, width, drawControlDot) {
                    context.save();
                    context.strokeStyle = color;
                    context.fillStyle = color;
                    context.lineWidth = width;
                    context.lineCap = 'round';
                    context.lineJoin = 'round';
                    context.setLineDash([]);
                    
                    context.beginPath();
                    context.moveTo(start.x, start.y);
                    context.quadraticCurveTo(control.x, control.y, end.x, end.y);
                    context.stroke();

                    const angle = Math.atan2(end.y - control.y, end.x - control.x);
                    const arrowLength = Math.max(15, width * 3); 

                    context.beginPath();
                    context.moveTo(end.x, end.y);
                    context.lineTo(end.x - arrowLength * Math.cos(angle - Math.PI / 6), end.y - arrowLength * Math.sin(angle - Math.PI / 6));
                    context.lineTo(end.x - arrowLength * Math.cos(angle + Math.PI / 6), end.y - arrowLength * Math.sin(angle + Math.PI / 6));
                    context.closePath();
                    context.fill();
                    
                    if (drawControlDot) {
                        context.beginPath();
                        context.arc(control.x, control.y, 10, 0, Math.PI * 2);
                        context.fillStyle = "#0ea5e9";
                        context.fill();
                        context.strokeStyle = "#ffffff";
                        context.lineWidth = 2;
                        context.stroke();
                    }
                    context.restore();
                }

                function commitText() {
                    if (!currentTextarea) return;
                    const text = currentTextarea.value;
                    if (text.trim() !== '') {
                        const fontSize = parseInt(currentTextarea.style.fontSize);
                        ctx.font = `${fontSize}px Inter, Arial`;
                        ctx.fillStyle = currentTextarea.style.color;
                        ctx.textBaseline = 'top';
                        
                        // Przeliczenie relatywnych współrzędnych pola textarea na wewnętrzne wymiary tablicy
                        const rect = canvas.getBoundingClientRect();
                        const scaleX = canvas.width / rect.width;
                        const scaleY = canvas.height / rect.height;
                        
                        const padding = 8 * scaleX; 
                        const x = (parseInt(currentTextarea.style.left) * scaleX) + padding;
                        const y = (parseInt(currentTextarea.style.top) * scaleY) + padding;
                        const maxWidth = (currentTextarea.clientWidth * scaleX) - (padding * 2);
                        const lineHeight = fontSize * 1.3;
                        
                        drawWrappedText(ctx, text, x, y, maxWidth, lineHeight);
                        saveState();
                    }
                    
                    if (currentTextarea.parentNode === canvasWrapper) {
                        canvasWrapper.removeChild(currentTextarea);
                    }
                    currentTextarea = null;
                }

                function drawWrappedText(context, text, x, y, maxWidth, lineHeight) {
                    const paragraphs = text.split('\n');
                    let currentY = y;
                    
                    for (let p = 0; p < paragraphs.length; p++) {
                        const words = paragraphs[p].split(' ');
                        let line = '';

                        for (let n = 0; n < words.length; n++) {
                            const testLine = line + words[n] + ' ';
                            const metrics = context.measureText(testLine);
                            const testWidth = metrics.width;
                            
                            if (testWidth > maxWidth && n > 0) {
                                context.fillText(line, x, currentY);
                                line = words[n] + ' ';
                                currentY += lineHeight;
                            } else {
                                line = testLine;
                            }
                        }
                        context.fillText(line, x, currentY);
                        currentY += lineHeight;
                    }
                }

                // ZASTĄPIENIE ZDARZEŃ MYSZY POINTER EVENTS API DLA WSPARCIA MOBILNEGO
                const handlePointerDown = (e) => {
                    e.preventDefault(); // Blokuje domyślne akcje przeglądarki na urządzeniach dotykowych
                    canvas.setPointerCapture(e.pointerId); // Utrzymuje wskaźnik nawet gdy ucieknie z tablicy
                    
                    const coords = getCoords(e);
                    
                    if (currentTextarea) commitText();

                    if (isEditingArrow) {
                        const dist = Math.sqrt(Math.pow(coords.x - arrowControl.x, 2) + Math.pow(coords.y - arrowControl.y, 2));
                        if (dist < 20) { // Zwiększono margines błędu kliknięcia dla palców
                            isDraggingArrowControl = true;
                            return;
                        } else {
                            commitArrow(); 
                        }
                    }

                    if (isTransforming) {
                        let cx = selX + selW / 2;
                        let cy = selY + selH / 2;
                        let dx = coords.x - cx;
                        let dy = coords.y - cy;
                        
                        let rx = dx * Math.cos(-selAngle) - dy * Math.sin(-selAngle);
                        let ry = dx * Math.sin(-selAngle) + dy * Math.cos(-selAngle);
                        
                        let distRotate = Math.sqrt(rx * rx + (ry + selH / 2 + 25) * (ry + selH / 2 + 25));
                        let distResize = Math.sqrt((rx - selW / 2) * (rx - selW / 2) + (ry - selH / 2) * (ry - selH / 2));
                        
                        if (distRotate < 25) { // Zwiększony hitbox dla palców
                            activeTransformMode = 'rotate';
                            return;
                        } else if (distResize < 25) { // Zwiększony hitbox dla palców
                            activeTransformMode = 'resize';
                            return;
                        } else if (rx >= -selW / 2 && rx <= selW / 2 && ry >= -selH / 2 && ry <= selH / 2) {
                            activeTransformMode = 'move';
                            dragOffsetX = coords.x - selX;
                            dragOffsetY = coords.y - selY;
                            return;
                        } else {
                            commitTransform();
                        }
                    }

                    isDrawing = true;
                    startX = coords.x;
                    startY = coords.y;
                    snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

                    ctx.strokeStyle = colorPicker.value;
                    ctx.fillStyle = colorPicker.value;
                    ctx.lineWidth = brushSize.value;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.setLineDash([]);
                    
                    if (toolSelect.value !== 'select' && toolSelect.value !== 'text' && toolSelect.value !== 'arrow') {
                        ctx.beginPath();
                        // Rysowanie kropki po samym kliknięciu
                        if(toolSelect.value === 'pen'){
                            ctx.moveTo(startX, startY);
                            ctx.lineTo(startX, startY);
                            ctx.stroke();
                        }
                    }
                };

                const handlePointerMove = (e) => {
                    e.preventDefault();
                    const coords = getCoords(e);

                    if (isEditingArrow && isDraggingArrowControl) {
                        arrowControl.x = coords.x;
                        arrowControl.y = coords.y;
                        ctx.putImageData(snapshot, 0, 0);
                        drawCurvedArrow(ctx, arrowStart, arrowControl, arrowEnd, colorPicker.value, brushSize.value, true);
                        return;
                    }

                    if (isTransforming && activeTransformMode) {
                        if (activeTransformMode === 'move') {
                            selX = coords.x - dragOffsetX;
                            selY = coords.y - dragOffsetY;
                        } else if (activeTransformMode === 'rotate') {
                            let cx = selX + selW / 2;
                            let cy = selY + selH / 2;
                            selAngle = Math.atan2(coords.y - cy, coords.x - cx) + Math.PI / 2;
                        } else if (activeTransformMode === 'resize') {
                            let cx = selX + selW / 2;
                            let cy = selY + selH / 2;
                            let dx = coords.x - cx;
                            let dy = coords.y - cy;
                            
                            let rx = dx * Math.cos(-selAngle) - dy * Math.sin(-selAngle);
                            let ry = dx * Math.sin(-selAngle) + dy * Math.cos(-selAngle);
                            
                            selW = Math.max(30, Math.abs(rx) * 2);
                            selH = Math.max(30, Math.abs(ry) * 2);
                        }
                        drawTransforming();
                        return;
                    }

                    if (!isDrawing) return;
                    const currentTool = toolSelect.value;
                    
                    if (currentTool !== 'pen') {
                        ctx.putImageData(snapshot, 0, 0);
                    }

                    if (currentTool === 'pen') {
                        ctx.lineTo(coords.x, coords.y);
                        ctx.stroke();
                    } else if (currentTool === 'rect') {
                        ctx.strokeRect(startX, startY, coords.x - startX, coords.y - startY);
                    } else if (currentTool === 'circle') {
                        const radius = Math.sqrt(Math.pow(coords.x - startX, 2) + Math.pow(coords.y - startY, 2));
                        ctx.beginPath();
                        ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
                        ctx.stroke();
                    } else if (currentTool === 'arrow') {
                        let tempControl = { x: (startX + coords.x) / 2, y: (startY + coords.y) / 2 };
                        drawCurvedArrow(ctx, {x: startX, y: startY}, tempControl, {x: coords.x, y: coords.y}, colorPicker.value, brushSize.value, false);
                    } else if (currentTool === 'select' || currentTool === 'text') {
                        ctx.setLineDash([6, 6]);
                        ctx.strokeStyle = currentTool === 'select' ? "#0ea5e9" : colorPicker.value;
                        ctx.lineWidth = 2;
                        ctx.strokeRect(startX, startY, coords.x - startX, coords.y - startY);
                    }
                };

                const handlePointerUp = (e) => {
                    e.preventDefault();
                    canvas.releasePointerCapture(e.pointerId);
                    const coords = getCoords(e);

                    if (isEditingArrow && isDraggingArrowControl) {
                        isDraggingArrowControl = false;
                        return;
                    }

                    if (isTransforming) {
                        activeTransformMode = null;
                        return;
                    }

                    if (!isDrawing) return;
                    isDrawing = false;

                    const currentTool = toolSelect.value;

                    if (currentTool === 'arrow') {
                        ctx.putImageData(snapshot, 0, 0);
                        arrowStart = { x: startX, y: startY };
                        arrowEnd = { x: coords.x, y: coords.y };
                        
                        // Zabezpieczenie przed stworzeniem strzałki z jednego kliknięcia
                        if(Math.abs(startX - coords.x) < 5 && Math.abs(startY - coords.y) < 5) {
                            isEditingArrow = false;
                            return;
                        }
                        
                        arrowControl = { x: (startX + coords.x) / 2, y: (startY + coords.y) / 2 };
                        isEditingArrow = true;
                        drawCurvedArrow(ctx, arrowStart, arrowControl, arrowEnd, colorPicker.value, brushSize.value, true);
                    } else if (currentTool === 'text') {
                        ctx.putImageData(snapshot, 0, 0);
                        
                        const rect = canvas.getBoundingClientRect();
                        const scaleX = rect.width / canvas.width;
                        const scaleY = rect.height / canvas.height;
                        
                        let clientStartX = (startX * scaleX);
                        let clientStartY = (startY * scaleY);
                        let clientEndX = (coords.x * scaleX);
                        let clientEndY = (coords.y * scaleY);
                        
                        let x = Math.min(clientStartX, clientEndX);
                        let y = Math.min(clientStartY, clientEndY);
                        let w = Math.abs(clientEndX - clientStartX);
                        let h = Math.abs(clientEndY - clientStartY);
                        
                        if (w < 40 || h < 40) { w = 250; h = 100; }

                        const fontSize = Math.max(16, brushSize.value * 4); // Lepsza widoczność czcionki mobilnie
                        const textarea = document.createElement('textarea');
                        textarea.className = 'dynamic-textarea';
                        textarea.style.left = `${x}px`;
                        textarea.style.top = `${y}px`;
                        textarea.style.width = `${w}px`;
                        textarea.style.height = `${h}px`;
                        textarea.style.color = colorPicker.value;
                        textarea.style.fontSize = `${fontSize}px`;
                        textarea.placeholder = "Zacznij pisać...";

                        canvasWrapper.appendChild(textarea);
                        textarea.focus();
                        currentTextarea = textarea;
                    } else if (currentTool === 'select') {
                        let w = Math.abs(coords.x - startX);
                        let h = Math.abs(coords.y - startY);
                        
                        if (w > 10 && h > 10) {
                            selX = Math.min(startX, coords.x);
                            selY = Math.min(startY, coords.y);
                            selW = w;
                            selH = h;
                            selAngle = 0;

                            ctx.putImageData(snapshot, 0, 0);

                            offscreenCanvas.width = selW;
                            offscreenCanvas.height = selH;
                            oCtx.drawImage(canvas, selX, selY, selW, selH, 0, 0, selW, selH);

                            ctx.fillStyle = "white";
                            ctx.fillRect(selX, selY, selW, selH);
                            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
                            
                            isTransforming = true;
                            drawTransforming();
                        }
                    } else {
                        saveState();
                    }
                };

                // Rejestracja zdarzeń dotykowych / rysikowych / myszy
                canvas.addEventListener('pointerdown', handlePointerDown);
                canvas.addEventListener('pointermove', handlePointerMove);
                canvas.addEventListener('pointerup', handlePointerUp);
                canvas.addEventListener('pointercancel', handlePointerUp);

                const handleKeyDown = (e) => {
                    if (document.activeElement.tagName === 'TEXTAREA') return;
                    if (e.ctrlKey && e.key.toLowerCase() === 'z') {
                        undo();
                    }
                    else if (e.ctrlKey && e.key.toLowerCase() === 'c') {
                        if (isTransforming) {
                            internalClipboard = oCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height);
                            clipboardW = offscreenCanvas.width;
                            clipboardH = offscreenCanvas.height;
                        }
                    }
                    else if (e.ctrlKey && e.key.toLowerCase() === 'x') {
                        if (isTransforming) {
                            internalClipboard = oCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height);
                            clipboardW = offscreenCanvas.width;
                            clipboardH = offscreenCanvas.height;
                            isTransforming = false;
                            ctx.putImageData(snapshot, 0, 0);
                            saveState();
                        }
                    }
                    else if (e.ctrlKey && e.key.toLowerCase() === 'v') {
                        if (internalClipboard) {
                            if (isTransforming) commitTransform();
                            if (isEditingArrow) commitArrow();
                            
                            selX = canvas.width / 2 - clipboardW / 2;
                            selY = canvas.height / 2 - clipboardH / 2;
                            selW = clipboardW;
                            selH = clipboardH;
                            selAngle = 0;
                            offscreenCanvas.width = selW;
                            offscreenCanvas.height = selH;
                            oCtx.putImageData(internalClipboard, 0, 0);
                            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
                            isTransforming = true;
                            drawTransforming();
                        }
                    }
                    else if (e.key === 'Delete' || e.key === 'Del' || e.key === 'Backspace') {
                        if (isTransforming) {
                            isTransforming = false;
                            activeTransformMode = null;
                            ctx.putImageData(snapshot, 0, 0); 
                            saveState();
                        }
                    }
                };
                document.addEventListener('keydown', handleKeyDown);

                clearBtn.addEventListener('click', () => {
                    if (isTransforming) isTransforming = false;
                    if (isEditingArrow) isEditingArrow = false;
                    if (currentTextarea) {
                        if (currentTextarea.parentNode === canvasWrapper) canvasWrapper.removeChild(currentTextarea);
                        currentTextarea = null;
                    }
                    ctx.fillStyle = "white";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    saveState();
                });

                downloadJpg.addEventListener('click', () => {
                    if (isTransforming) commitTransform();
                    if (currentTextarea) commitText();
                    if (isEditingArrow) commitArrow();
                    const link = document.createElement('a');
                    link.download = `Tablica_Sesja_${userInfo?.nickname || 'Pacjent'}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 1.0);
                    link.click();
                });

                return () => {
                    document.removeEventListener('keydown', handleKeyDown);
                    canvas.removeEventListener('pointerdown', handlePointerDown);
                    canvas.removeEventListener('pointermove', handlePointerMove);
                    canvas.removeEventListener('pointerup', handlePointerUp);
                    canvas.removeEventListener('pointercancel', handlePointerUp);
                };
            }, [userInfo]);

            return (
                <div className="flex flex-col md:flex-row gap-3 md:gap-5 h-full w-full justify-center items-stretch relative">
                    
                    {/* RESPONSYWNY PANEL NARZĘDZI */}
                    <div className="md:w-60 bg-white border border-slate-200 p-3 md:p-4 rounded-xl flex flex-row md:flex-col gap-3 md:gap-4 shadow-sm shrink-0 overflow-x-auto md:overflow-y-auto mobile-tool-scroll z-10 w-full md:h-full max-h-[140px] md:max-h-[800px] items-center md:items-stretch">
                        
                        <div className="hidden md:block font-bold text-slate-800 border-b border-slate-100 pb-2 uppercase tracking-wider text-xs">
                            Narzędzia pracy
                        </div>
                        
                        <div className="flex-col md:flex-col flex gap-1 min-w-[100px]">
                            <label className="text-[10px] text-slate-400 font-bold uppercase tracking-wider hidden md:block">Narzędzie:</label>
                            <select id="toolSelect" className="w-full p-2 border border-slate-200 rounded-lg bg-slate-50 hover:bg-white focus:ring-2 focus:ring-therapy-100 outline-none cursor-pointer text-sm font-medium transition-colors">
                                <option value="pen">✏️ Pędzel</option>
                                <option value="rect">🟦 Prostokąt</option>
                                <option value="circle">⭕ Koło</option>
                                <option value="arrow">↗️ Strzałka</option>
                                <option value="text">A Tekst</option>
                                <option value="select">⬚ Zaznaczenie</option>
                            </select>
                        </div>
                        
                        <div className="flex-col md:flex-col flex gap-1 min-w-[60px]">
                            <label className="text-[10px] text-slate-400 font-bold uppercase tracking-wider hidden md:block">Kolor:</label>
                            <input type="color" id="colorPicker" defaultValue="#0f172a" className="w-12 md:w-full h-10 p-1 border border-slate-200 rounded-lg cursor-pointer bg-slate-50" />
                        </div>

                        <div className="flex-col md:flex-col flex gap-1 min-w-[100px] flex-1 md:flex-none">
                            <label className="text-[10px] text-slate-400 font-bold uppercase tracking-wider hidden md:block">Grubość:</label>
                            <input type="range" id="brushSize" min="2" max="40" defaultValue="4" className="w-full accent-therapy-500 cursor-pointer h-2 bg-slate-200 rounded-lg" />
                        </div>

                        <div className="flex flex-row md:flex-col gap-2 min-w-[160px] md:mt-auto md:pt-4 md:border-t md:border-slate-100">
                            <button id="undoBtn" className="flex-1 md:w-full bg-slate-100 border border-slate-200 text-slate-700 font-semibold text-xs md:text-sm py-2 px-3 rounded-lg hover:bg-slate-200 transition active:scale-[0.96]">
                                ↩ Cofnij
                            </button>
                            <button id="clearBtn" className="flex-1 md:w-full bg-red-50 text-red-600 border border-red-100 font-semibold text-xs md:text-sm py-2 px-3 rounded-lg hover:bg-red-100 transition active:scale-[0.96]">
                                🗑 Wyczyść
                            </button>
                        </div>
                        
                        {/* Ukryty przycisk eksportu */}
                        <button id="downloadJpg" className="hidden" aria-hidden="true"></button>
                    </div>

                    {/* OBSZAR PŁÓTNA */}
                    <div id="canvasWrapper" ref={wrapperRef} className="shadow-md flex-1 relative bg-white border border-slate-200 rounded-xl overflow-hidden touch-none h-full min-h-[400px]">
                        <canvas ref={canvasRef} id="board" width="1400" height="900" className="touch-none bg-white rounded-xl"></canvas>
                    </div>
                </div>
            );
        }

        // --- KROK 3: PANEL WSPÓŁPRACY ---
        function Workspace({ roomInfo, userInfo, setStep }) {
            const [content, setContent] = useState('');
            const [timeLeft, setTimeLeft] = useState((roomInfo?.duration || 60) * 60);
            const [isExporting, setIsExporting] = useState(false);
            const [activeTab, setActiveTab] = useState('board'); // Domyślnie tablica w tym kontekście

            useEffect(() => {
                const timer = setInterval(() => {
                    setTimeLeft((prev) => (prev > 0 ? prev - 1 : 0));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const handleExportPDF = () => {
                setIsExporting(true);
                const element = document.createElement('div');
                const formattedContent = content.replace(/\n/g, '<br>');
                element.innerHTML = `
                    <div style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 50px; color: #1e293b; background: #ffffff;">
                        <div style="border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 30px;">
                            <h1 style="font-size: 26px; font-weight: 700; color: #0c4a6e; margin: 0 0 8px 0;">${roomInfo?.name || 'Sesja Terapeutyczna'}</h1>
                            <p style="font-size: 14px; color: #64748b; margin: 0;">Podsumowanie sesji psychoterapii</p>
                        </div>
                        
                        <div style="margin-bottom: 30px; background: #f8fafc; padding: 15px; border-radius: 8px; font-size: 13px; color: #475569;">
                            <table style="width: 100%; border-collapse: collapse;">
                                <tr>
                                    <td style="padding: 4px 0;"><strong>Uczestnik sesji:</strong> ${userInfo?.nickname}</td>
                                    <td style="padding: 4px 0; text-align: right;"><strong>Data:</strong> ${new Date().toLocaleDateString('pl-PL')}</td>
                                </tr>
                                <tr>
                                    <td style="padding: 4px 0;"><strong>Status dokumentu:</strong> Zapisany pomyślnie</td>
                                    <td style="padding: 4px 0; text-align: right;"><strong>Platforma:</strong> Zarysowane</td>
                                </tr>
                            </table>
                        </div>

                        <div style="font-size: 15px; line-height: 1.8; color: #334155; min-height: 400px;">
                            ${formattedContent || '<em>Brak notatek tekstowych z sesji.</em>'}
                        </div>

                        <div style="margin-top: 50px; border-top: 1px solid #e2e8f0; padding-top: 15px; text-align: center; font-size: 11px; color: #94a3b8;">
                            Dokument wygenerowany automatycznie przez aplikację Zarysowane. Treści zawarte w dokumencie są objęte tajemnicą zawodową.
                        </div>
                    </div>
                `;

                const opt = {
                    margin:       10,
                    filename:     `Notatki_${userInfo?.nickname || 'Pacjent'}_${new Date().toISOString().slice(0,10)}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                html2pdf().from(element).set(opt).save().then(() => {
                    setIsExporting(false);
                }).catch(() => {
                    setIsExporting(false);
                });
            };

            return (
                <div className="h-screen w-screen flex flex-col bg-slate-50 overflow-hidden">
                    <header className="bg-white border-b border-slate-200 px-4 sm:px-6 py-3 flex justify-between items-center shrink-0 shadow-sm z-20">
                        <div className="flex items-center gap-3">
                            <div className="w-9 h-9 sm:w-10 sm:h-10 rounded-full bg-therapy-100 flex items-center justify-center text-therapy-600 font-bold text-sm sm:text-base shrink-0">
                                {userInfo?.nickname?.charAt(0).toUpperCase()}
                            </div>
                            <div className="hidden sm:block">
                                <h2 className="font-semibold text-slate-800 text-sm sm:text-base leading-tight truncate max-w-[150px] md:max-w-xs">{roomInfo?.name}</h2>
                                <p className="text-[10px] sm:text-xs text-slate-500 truncate max-w-[150px]">{userInfo?.nickname}</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-2 sm:gap-4">
                            <div className="text-right mr-1 sm:mr-3">
                                <span className="text-[9px] sm:text-[10px] text-slate-500 uppercase tracking-wider font-bold block">Czas</span>
                                <div className={`text-base sm:text-xl font-mono font-medium ${timeLeft < 300 ? 'text-amber-500 font-bold animate-pulse' : 'text-slate-600'}`}>
                                    {formatTime(timeLeft)}
                                </div>
                            </div>

                            <button 
                                onClick={handleExportPDF} 
                                disabled={isExporting}
                                className={`p-2 bg-rose-50 hover:bg-rose-100 text-rose-600 border border-rose-200 rounded-lg transition-colors shadow-sm flex items-center justify-center ${isExporting ? 'opacity-50 cursor-not-allowed' : ''}`}
                                title="Pobierz Notatki (PDF)"
                            >
                                {isExporting ? (
                                    <svg className="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                ) : (
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                )}
                            </button>

                            <button 
                                onClick={() => document.getElementById('downloadJpg')?.click()} 
                                className="p-2 bg-therapy-500 hover:bg-therapy-600 text-white rounded-lg transition-colors shadow-sm flex items-center justify-center"
                                title="Pobierz Tablicę (JPG)"
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            </button>

                            <button onClick={() => setStep(1)} className="hidden sm:block text-sm px-4 py-2 border border-slate-200 text-slate-600 hover:text-red-600 hover:bg-red-50 hover:border-red-100 rounded-lg transition-colors ml-2 font-medium">
                                Zakończ
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden p-2 sm:p-4 md:p-6 flex flex-col items-center">
                        <div className="w-full max-w-6xl flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                            
                            {/* Zakładki mobilne/desktopowe */}
                            <div className="flex bg-slate-50 border-b border-slate-200 px-2 sm:px-4 pt-2 gap-1 sm:gap-2 shrink-0">
                                <button 
                                    onClick={() => setActiveTab('board')} 
                                    className={`px-4 sm:px-6 py-3 rounded-t-xl text-xs sm:text-sm font-semibold transition-all ${activeTab === 'board' ? 'bg-white text-therapy-600 border-t border-l border-r border-slate-200 shadow-[0_2px_0_0_#fff]' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-700'}`}
                                >
                                    🎨 Wirtualna Tablica
                                </button>
                                <button 
                                    onClick={() => setActiveTab('text')} 
                                    className={`px-4 sm:px-6 py-3 rounded-t-xl text-xs sm:text-sm font-semibold transition-all ${activeTab === 'text' ? 'bg-white text-therapy-600 border-t border-l border-r border-slate-200 shadow-[0_2px_0_0_#fff]' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-700'}`}
                                >
                                    📝 Notatki
                                </button>
                            </div>

                            <div className="h-8 bg-slate-50/80 border-b border-slate-100 flex items-center px-4 justify-between shrink-0">
                                <div className="flex items-center gap-2">
                                    <span className="relative flex h-2 w-2">
                                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                      <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                    </span>
                                    <span className="text-[10px] sm:text-[11px] text-slate-500 font-medium">
                                        Sesja na żywo
                                    </span>
                                </div>
                                <span className="text-[9px] sm:text-[10px] text-slate-400 italic hidden sm:inline-block">
                                    Zmiany zapisują się automatycznie (lokalnie)
                                </span>
                            </div>

                            <div className="flex-1 relative overflow-hidden h-full">
                                <textarea 
                                    value={content}
                                    onChange={(e) => setContent(e.target.value)}
                                    className={`w-full h-full p-4 sm:p-8 resize-none outline-none text-slate-700 text-base sm:text-lg leading-relaxed bg-transparent font-light absolute top-0 left-0 ${activeTab === 'text' ? 'block' : 'hidden'}`}
                                    placeholder="Dodaj tekstowe podsumowanie, własne myśli lub wnioski z tablicy..."
                                ></textarea>
                                
                                <div className={`p-2 sm:p-4 h-full w-full flex justify-center items-center bg-slate-50 absolute top-0 left-0 overflow-hidden ${activeTab === 'board' ? 'flex' : 'hidden'}`}>
                                    <Whiteboard userInfo={userInfo} />
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // --- GŁÓWNY ZARZĄDCA STANU APLIKACJI ---
        function App() {
            const [step, setStep] = useState(1);
            const [roomInfo, setRoomInfo] = useState(null);
            const [userInfo, setUserInfo] = useState(null);

            return (
                <div className="font-sans antialiased bg-slate-50 text-slate-800">
                    {step === 1 && <CreateRoom setStep={setStep} setRoomInfo={setRoomInfo} />}
                    {step === 2 && <JoinRoom roomInfo={roomInfo} setStep={setStep} setUserInfo={setUserInfo} />}
                    {step === 3 && <Workspace roomInfo={roomInfo} userInfo={userInfo} setStep={setStep} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
